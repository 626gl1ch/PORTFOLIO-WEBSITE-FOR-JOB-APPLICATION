<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChainLedger | DeFi Portfolio Architecture</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #050505;
            --surface: #0d0d0d;
            --accent: #7c3aed;
            --cyan: #06b6d4;
            --grad: linear-gradient(135deg, #7c3aed, #06b6d4);
            --border: rgba(255,255,255,0.08);
            --text: #ffffff;
            --muted: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Mono', monospace; display: flex; height: 100vh; overflow: hidden; }

        /* Navigation */
        aside { width: 280px; background: var(--surface); border-right: 1px solid var(--border); padding: 40px; display: flex; flex-direction: column; }
        .logo { font-family: 'Syne', sans-serif; font-size: 22px; margin-bottom: 50px; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        .nav-item { padding: 15px 0; cursor: pointer; color: var(--muted); transition: all 0.3s; font-size: 13px; font-weight: 600; }
        .nav-item:hover, .nav-item.active { color: white; }
        .nav-item.active { border-right: 2px solid var(--accent); }

        /* Main Area */
        main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.02) 1px, transparent 0); background-size: 40px 40px; }
        header { padding: 30px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        
        .page { display: none; padding: 50px; }
        .page.active { display: block; animation: glassFade 0.4s ease; }
        @keyframes glassFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

        /* Components */
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 24px; padding: 40px; margin-bottom: 24px; }
        .card-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .value-text { font-family: 'Syne', sans-serif; font-size: 42px; margin-bottom: 8px; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 15px 0; border-bottom: 1px solid var(--border); color: var(--muted); font-weight: normal; }
        td { padding: 15px 0; border-bottom: 1px solid var(--border); }

        /* Toasts */
        #notif-host { position: fixed; top: 40px; right: 40px; z-index: 2000; }
        .toast { background: var(--surface); border: 1px solid var(--accent); padding: 15px 25px; font-size: 12px; border-radius: 12px; box-shadow: 0 10px 40px rgba(124,58,237,0.2); animation: slideIn 0.3s forwards; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        /* Back Navigation */
        .back-nav { position: fixed; bottom: 40px; left: 40px; z-index: 1000; }
        .btn-back { background: var(--surface); border: 1px solid var(--border); color: white; padding: 12px 24px; border-radius: 100px; text-decoration: none; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
    </style>

<style id="ge-patch">
/* ── GE PORTFOLIO PATCH: Mobile Responsiveness & Design Polish ── */
@import url('https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700&display=swap');

/* Back nav upgrade */
.back-nav,.btn-back { z-index:9999 !important; }
.btn-back {
  font-family:'Cabinet Grotesk',sans-serif !important;
  font-size:12px !important; font-weight:700 !important;
  letter-spacing:0.5px !important;
  transition:all .2s !important;
  white-space:nowrap;
}

/* Mobile sidebar overlay trigger */
.ge-burger {
  display:none;
  position:fixed;top:12px;left:12px;z-index:9998;
  width:38px;height:38px;border-radius:9px;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.15);
  align-items:center;justify-content:center;
  cursor:pointer;color:#fff;font-size:18px;
  transition:border-color .2s;
}
.ge-burger svg { pointer-events:none; }
.ge-overlay {
  display:none;
  position:fixed;inset:0;background:rgba(0,0,0,0.5);
  z-index:997;backdrop-filter:blur(4px);
}
.ge-overlay.active { display:block; }

/* Mobile: when sidebar is toggled */
body.ge-mobile-open aside {
  transform:translateX(0) !important;
  box-shadow:12px 0 48px rgba(0,0,0,0.5) !important;
}

@media(max-width:860px){
  .ge-burger { display:flex; }

  /* Push aside off-screen by default */
  body:not(.ge-mobile-open) aside {
    transform:translateX(-110%) !important;
    transition:transform .3s cubic-bezier(.2,.8,.2,1) !important;
  }
  aside {
    position:fixed !important;top:0;left:0;bottom:0;
    z-index:998 !important;
    transition:transform .3s cubic-bezier(.2,.8,.2,1) !important;
    overflow-y:auto !important;
  }

  /* Main fills full width */
  main, body > main { margin-left:0 !important; }
  body { overflow-x:hidden; }

  /* Back nav repositioned for mobile */
  .back-nav {
    bottom:16px !important;
    left:50% !important;
    transform:translateX(-50%) !important;
  }
  .btn-back { padding:10px 20px !important; font-size:11px !important; }

  /* Table horizontal scroll */
  table { display:block; overflow-x:auto; -webkit-overflow-scrolling:touch; }
}

@media(max-width:540px){
  main, body > main { padding:16px !important; }
  .kpi-row, .kpi-grid, .dashboard-grid {
    grid-template-columns:1fr 1fr !important;
    gap:10px !important;
  }
  .chart-grid, .main-grid, .lab-grid, .analytics-grid {
    grid-template-columns:1fr !important;
    gap:16px !important;
  }
  .panel, .glass-card, .card, .editor-card, .main-panel {
    padding:16px !important;
  }
  h1 { font-size:clamp(20px,6vw,30px) !important; }
  .value-text { font-size:clamp(18px,5vw,28px) !important; }
}
</style>

</head>
<body>
    <div id="notif-host"></div>
    <div class="back-nav">
        <a href="../index.html" class="btn-back">← BACK TO PORTFOLIO</a>
    </div>

    <aside>
        <div class="logo">CHAINLEDGER</div>
        <div class="nav-item active" onclick="showPage('portfolio')">Portfolio Overview</div>
        <div class="nav-item" onclick="showPage('liquidity')">Liquidity Pools</div>
        <div class="nav-item" onclick="showPage('governance')">Governance</div>
        <div class="nav-item" onclick="showPage('settings')">Settings</div>
        <div style="margin-top: auto; font-size: 10px; color: var(--muted);">NODE: ETH_MAINNET_L2</div>
    </aside>

    <main>
        <header>
            <div style="display:flex; gap: 20px;">
                <div style="padding: 8px 16px; background: rgba(6,182,212,0.1); color: var(--cyan); border-radius: 100px; font-size: 11px; font-weight: 600;">ACTIVE: 0x3f4A...9c2B</div>
            </div>
            <div class="value-text" style="font-size: 24px; margin:0">$84,230.44</div>
        </header>

        <!-- PORTFOLIO PAGE -->
        <div id="portfolio" class="page active">
            <div class="dashboard-grid">
                <div class="glass-card">
                    <div class="card-label">Asset Allocation</div>
                    <div style="height:250px;"><canvas id="allocChart"></canvas></div>
                </div>
                <div class="glass-card">
                    <div class="card-label">Historical Value (30D)</div>
                    <div style="height:250px;"><canvas id="histChart"></canvas></div>
                </div>
            </div>

            <div class="glass-card">
                <div class="card-label">Recent On-Chain Activity</div>
                <table>
                    <thead><tr><th>Protocol</th><th>Type</th><th>Asset</th><th>Value</th><th>Status</th></tr></thead>
                    <tbody id="tx-table"></tbody>
                </table>
            </div>
        </div>

        <!-- LIQUIDITY PAGE -->
        <div id="liquidity" class="page">
            <div class="glass-card">
                <h1 style="font-family:'Syne'">Active Positions</h1>
                <p style="color:var(--muted); margin-top:10px;">Yield generation across Uniswap V3 and Aave.</p>
                <div id="pool-list" style="margin-top:40px;"></div>
            </div>
        </div>
    </main>

    <script>
        function notify(msg) {
            const host = document.getElementById('notif-host');
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = `[WEB3] ${msg}`;
            host.appendChild(t);
            setTimeout(() => t.remove(), 3500);
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => {
                i.classList.remove('active');
                if(i.textContent.toLowerCase().includes(id)) i.classList.add('active');
            });
            notify(`Initializing secure interface: ${id.toUpperCase()}`);
        }

        // Table
        const txs = [
            { p: "Uniswap", t: "SWAP", a: "ETH → USDC", v: "$4,250", s: "CONFIRMED" },
            { p: "Aave", t: "LEND", a: "USDC", v: "$1,200", s: "PENDING" }
        ];
        const tbody = document.getElementById('tx-table');
        txs.forEach(t => {
            const row = document.createElement('tr');
            row.innerHTML = `<td>${t.p}</td><td style="font-weight:700">${t.t}</td><td>${t.a}</td><td>${t.v}</td><td style="color:${t.s==='PENDING'?'var(--cyan)':'#10b981'}">${t.s}</td>`;
            tbody.appendChild(row);
        });

        // Charts
        Chart.defaults.color = '#888';
        const ctxA = document.getElementById('allocChart').getContext('2d');
        new Chart(ctxA, {
            type: 'doughnut',
            data: { labels: ['ETH','BTC','USDC'], datasets: [{ data: [45,25,30], backgroundColor: ['#7c3aed','#06b6d4','#111'], borderWidth: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, cutout: '80%' }
        });

        const ctxH = document.getElementById('histChart').getContext('2d');
        new Chart(ctxH, {
            type: 'line',
            data: { labels: Array.from({length: 30}, (_,i)=>i), datasets: [{ data: Array.from({length: 30}, ()=>Math.random()*10000+80000), borderColor: '#7c3aed', fill: false }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
        });
    </script>

<div class="ge-overlay" id="ge-overlay" onclick="geToggle()"></div>
<button class="ge-burger" id="ge-burger" onclick="geToggle()" aria-label="Menu">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
    <line x1="3" y1="7" x2="21" y2="7"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="17" x2="21" y2="17"/>
  </svg>
</button>
<script id="ge-patch-js">
function geToggle(){
  document.body.classList.toggle('ge-mobile-open');
  document.getElementById('ge-overlay').classList.toggle('active');
}
</script>

</body>
</html>
